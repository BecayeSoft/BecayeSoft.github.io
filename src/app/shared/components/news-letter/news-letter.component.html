<div class="w-full">

    <!-- Background -->
    <div class="absolute h-full w-full bg-rose-800">
        <!-- <img class="w-full h-full object-cover relative object-center"
            src="https://images.unsplash.com/photo-1586364800735-75db99e7185b?ixlib=rb-1.2.1&ixid=MnwxMjA3fDB8MHxzZWFyY2h8MTJ8fHNlbGYlMjBncm93dGh8ZW58MHwwfDB8fA%3D%3D&auto=format&fit=crop&w=500&q=60" />
         -->
        <!-- Overlay -->
        <div class="absolute top-0 left-0 bottom-0 right-0 opacity-20 bg-black"></div>
    </div>

    <!-- Subscribe -->
    <div class="w-9/12 p-20 h-full m-auto flex flex-col justify-center items-center relative text-white">
        <div class="text-center z-10">
            <h2 class="text-3xl underline decoration-sky-500">Want to hear more?</h2>
            <div>
                <p class="text-lg">Subscribe so you don't miss my latest projects/blog posts</p>
            </div>
        </div>
        <div>
            <form>
                <div class="flex">
                    <div class=" focus-within:p-1.5 focus-within:border-2 focus-within:border-white">
                        <mat-form-field class="bg-white h-14" appearance="outline">
                            <mat-label>Enter your email</mat-label>
                            <input type="email" matInput [formControl]="emailFormControl"
                                placeholder="Ex. positive@energy.com">
                            <mat-error class="mt-3.5" *ngIf="emailFormControl.hasError('email')">
                                Please enter a valid email address
                            </mat-error>
                        </mat-form-field>
                    </div>

                    <button mat-raised-button [color]="'primary'" class="ml-10 space-y-1 space-x-3 text-lg hover:opacity-80">
                        Subscribe
                    </button>
                </div>
            </form>
        </div>
        <!-- TODO: Use a toast instead -->
        <div class="text-white mt-6 text-lg" *ngIf="false">
            Thank you!
        </div>

        <!-- Portfolio -->
        <span class="p-7 text-2xl">OR</span>
        <a mat-raised-button color="primary" class="p-3 text-2xl hover:opacity-80">
            <span class="underline decoration-sky-500">
                Check out my Portfolio
            </span>
        </a>
    </div>
</div>
